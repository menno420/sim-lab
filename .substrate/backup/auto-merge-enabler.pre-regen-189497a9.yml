# substrate-kit auto-merge enabler (LIVE — installed per ORDER 003,
# control/inbox.md, mirrored from the idea-engine reference
# implementation: menno420/idea-engine
# .github/workflows/auto-merge-enabler.yml @ b5cc329038cf95ff5e373ff472b21b869f60ade2;
# host-customization ledger for the reference:
# idea-engine ideas/fleet/branch-prefix-drift-tripwire-2026-07-11.md).
# KIT-OWNED SHAPE: if a future `bootstrap.py adopt/upgrade` regenerates
# this file, the host customizations marked below are OVERWRITTEN and
# must be re-applied (the reference's PR #18 re-apply duty). Put new
# host-specific customizations in a SEPARATE workflow file, never here.
#
# Arms GitHub-native auto-merge on agent PRs at open, so a born-red
# session PR merges itself the moment the required check goes green.
# INERT until two one-time repo settings exist (owner UI):
#   1. Settings → General → Pull Requests → "Allow auto-merge" = ON.
#   2. A ruleset on the default branch REQUIRING the 'substrate-gate'
#      status check.
# (Both observed live on this repo — control/status.md OA-001,
# "required check enforced + auto-merge enabled".)
# With NO required check, arming merges a PR INSTANTLY — the
# refuse-to-arm guard below counts required contexts and refuses on
# zero rather than inverting the gate.
#
# CARVE-OUT: label `do-not-automerge` = never armed
# (job-level check + a fresh API re-read to defeat the stale-payload
# label race). The label is advisory routing; the required check
# going red is the enforcement.
name: auto-merge-enabler
on:
  pull_request:
    # `synchronize` (every push to the PR head) re-arms: arming is
    # idempotent and never merges anything itself — the merge stays
    # gated by the required check. This narrows the green-behind
    # stall: a fix-push or `git merge origin/<base>` re-arms on the
    # up-to-date head.
    types: [opened, reopened, ready_for_review, synchronize]
permissions:
  contents: write
  pull-requests: write
concurrency:
  group: auto-merge-enabler-${{ github.event.pull_request.number }}
  cancel-in-progress: false
jobs:
  enable-auto-merge:
    # HOST ADAPTATION (sim-lab): the branch-prefix allowlist below is
    # this repo's EMPIRICAL survey (head refs of PRs #1–#49), not the
    # reference's idea-engine list — an allowlist that matches zero
    # real prefixes is a silent no-op (the reference ledger's PR #54
    # incident class; the survey duty is the same file's tripwire).
    # `fix/` is retained from the reference list (this ORDER's own
    # branch class). Re-survey when branch conventions drift.
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.draft == false &&
      (startsWith(github.head_ref, 'claude/') || startsWith(github.head_ref, 'control/') || startsWith(github.head_ref, 'sim/') || startsWith(github.head_ref, 'harness/') || startsWith(github.head_ref, 'closeout/') || startsWith(github.head_ref, 'fix/') || startsWith(github.head_ref, 'verdict-') || startsWith(github.head_ref, 'intake-') || startsWith(github.head_ref, 'heartbeat-') || startsWith(github.head_ref, 'finalize-') || startsWith(github.head_ref, 'order-')) &&
      !contains(github.event.pull_request.labels.*.name, 'do-not-automerge')
    runs-on: ubuntu-latest
    steps:
      - name: Refuse to arm unless the base branch requires status CONTEXTS
        id: rules
        env:
          GH_TOKEN: ${{ secrets.ROUTINE_PAT || secrets.GITHUB_TOKEN }}
        run: |
          # Count required check CONTEXTS, not rules: a
          # required_status_checks RULE with an empty context list
          # still lets an armed PR merge with nothing to wait for.
          contexts="$(gh api "repos/$GITHUB_REPOSITORY/rules/branches/${{ github.base_ref }}" \
            --jq '[.[] | select(.type == "required_status_checks")
                   | .parameters.required_status_checks // [] | .[].context]')"
          count="$(printf '%s' "$contexts" | python3 -c 'import json,sys; print(len(json.load(sys.stdin)))')"
          echo "required contexts ($count): $contexts"
          echo "required=$count" >> "$GITHUB_OUTPUT"
          if [ "$count" = "0" ]; then
            echo "::warning::the base branch requires no status-check CONTEXTS — arming would merge instantly. Refusing to arm; make 'substrate-gate' a required check first (Settings → Rulesets on the default branch)."
          fi
      - name: Re-check the do-not-automerge label FRESH (stale-payload race guard)
        id: label
        if: steps.rules.outputs.required != '0'
        env:
          GH_TOKEN: ${{ secrets.ROUTINE_PAT || secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          # The event payload snapshots labels at PR-open time; an
          # MCP-created PR gets its label in a SECOND call right
          # after create. Wait a grace beat, then re-read labels
          # from the API and refuse to arm if the label is present
          # NOW (the kit #22 incident class).
          sleep 15
          labels="$(gh api "repos/$GITHUB_REPOSITORY/issues/$PR/labels" --jq '[.[].name] | join(",")')"
          echo "labels on re-read: $labels"
          case ",$labels," in
            *,do-not-automerge,*)
              echo "do-not-automerge present on re-read — refusing to arm."
              echo "skip=1" >> "$GITHUB_OUTPUT" ;;
            *)
              echo "skip=0" >> "$GITHUB_OUTPUT" ;;
          esac
      - name: Skip arming while the PR's own in-diff session card is in-progress
        id: card
        if: steps.rules.outputs.required != '0' && steps.label.outputs.skip == '0'
        env:
          # HOST CUSTOMIZATION (mirrored from the reference — idea-engine's
          # arm-at-open race guard, origin: its PR #80/#81 close-out race;
          # precedents #62/#64; ledger: idea-engine
          # ideas/fleet/branch-prefix-drift-tripwire-2026-07-11.md,
          # extension note 2): arming at `opened` squash-merges a green PR
          # in ~25s, out-racing every multi-commit plan — the session
          # close-out (card flip + heartbeat) then arrives on a merged PR
          # and needs a follow-up PR (sim-lab saw the same race live:
          # PR #38/#39, #40/#41). This repo's card convention makes intent
          # machine-readable: a session card ADDED born-red
          # (`> **Status:** `in-progress``, .sessions/README.md +
          # CONVENTIONS.md) means "more commits are coming". So: if this
          # PR's diff adds/modifies a `.sessions/*.md` card whose Status
          # badge still says `in-progress`, SKIP arming (exit green, no
          # arm) — the workflow re-runs on `synchronize`, so the close-out
          # push that flips the card to `complete` arms it then (arm only
          # once the branch is FINAL). Card-less PRs (control fast-lane,
          # heartbeats) arm at open exactly as before. Re-apply this step
          # after any adopt/upgrade regenerates this file. SECURITY: card
          # paths and contents are PR-controlled — they are read via the
          # API and parsed in Python only, passed as argv/env, NEVER
          # interpolated into this script body (the reference's PR #64
          # env-passing precedent).
          GH_TOKEN: ${{ secrets.ROUTINE_PAT || secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python3 - <<'PY'
          import json, os, re, subprocess, sys, urllib.parse

          repo = os.environ["GITHUB_REPOSITORY"]
          pr = os.environ["PR"]
          head = os.environ["HEAD_SHA"]

          def gh_api(*args):
              # argv-only (never a shell string): PR-controlled values can
              # ride as arguments but can never splice into a command.
              r = subprocess.run(["gh", "api", *args],
                                 capture_output=True, text=True)
              if r.returncode != 0:
                  print(r.stderr, file=sys.stderr)
                  sys.exit(1)  # fail LOUD: an unreadable diff must not arm
              return r.stdout

          def parse_line(line):
              v = json.loads(line)
              return json.loads(v) if isinstance(v, str) else v

          entries = [parse_line(line) for line in gh_api(
              f"repos/{repo}/pulls/{pr}/files?per_page=100",
              "--paginate", "--jq", ".[] | @json").splitlines() if line]
          cards = [e["filename"] for e in entries
                   if e["filename"].startswith(".sessions/")
                   and e["filename"].endswith(".md")
                   and e["filename"] != ".sessions/README.md"
                   and e.get("status") != "removed"]

          in_progress = []
          for path in cards:
              raw = gh_api("-H", "Accept: application/vnd.github.raw+json",
                           f"repos/{repo}/contents/"
                           f"{urllib.parse.quote(path)}?ref={head}")
              m = re.search(r"\*\*Status:\*\*\s*`?([A-Za-z-]+)`?", raw)
              status = m.group(1) if m else "<no Status badge>"
              print(f"card {path} @ {head[:12]}: status={status}")
              if status == "in-progress":
                  in_progress.append(path)

          skip = 1 if in_progress else 0
          if skip:
              print("in-progress session card(s) in this PR's diff — "
                    "refusing to arm; the close-out push that flips the card "
                    "to `complete` re-runs this workflow via `synchronize` "
                    "and arms then: " + ", ".join(in_progress))
          elif cards:
              print("all in-diff session cards are past in-progress — "
                    "arming may proceed.")
          else:
              print("no session card in this PR's diff — "
                    "arming may proceed (the card-less fast-lane class).")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"skip={skip}\n")
          PY
      - name: Enable native auto-merge (squash)
        if: steps.rules.outputs.required != '0' && steps.label.outputs.skip == '0' && steps.card.outputs.skip == '0'
        env:
          # Prefer a PAT so the eventual merge attributes to a real
          # user; GITHUB_TOKEN is the fallback.
          GH_TOKEN: ${{ secrets.ROUTINE_PAT || secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          # HOST CUSTOMIZATION (mirrored from the reference — idea-engine's
          # squash head-ref provenance, origin: its PR #62 card 💡; ledger:
          # idea-engine ideas/fleet/branch-prefix-drift-tripwire-2026-07-11.md,
          # extension note 1): the default squash subject `<title> (#N)`
          # carries NO branch name, so squash-only history starves every
          # history-derived branch survey — including the empirical
          # prefix-allowlist survey this workflow's `if:` depends on.
          # `--body` below stamps the source branch into the squash commit
          # body as a `Head-ref:` line. Passed via env, never interpolated
          # into the script (injection-safe). Re-apply after any
          # adopt/upgrade regenerates this file.
          HEAD_REF: ${{ github.head_ref }}
        run: |
          if gh pr merge --auto --squash "$PR" --repo "$GITHUB_REPOSITORY" --body "Head-ref: $HEAD_REF"; then
            echo "Auto-merge enabled for PR #$PR — it merges when 'substrate-gate' is green."
          else
            echo "::warning::Could not enable auto-merge for PR #$PR. Confirm: (1) 'Allow auto-merge' is ON, (2) the base branch requires the 'substrate-gate' check, (3) the token has Pull requests + Contents write. On a repo shape where GitHub structurally refuses the arm (born-red required checks with no pending window, or PR-required-but-no-CI), REST merge-on-green is the landing path instead — see CONVENTIONS.md (REST merge-on-green is PRIMARY on a born-red state)."
          fi
